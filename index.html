<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111111">
    <title>ClockIn</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    
    <section  id="loginView">
        <h2>Connexion</h2>
        
        <input id="emailInput" type="email" placeholder="Email" autocomplete="username">
        <input id="passwordInput" type="password" placeholder="Mot de passe" autocomplete="current-password">
        
        <button id="loginBtn">Se connecter</button>
        <p id="loginError"></p>
    </section>
    
    <div id="black_overlay" hidden></div>

    <section id="app_view" hidden>

        <section id="add_shift">
            <form action="" id="form" class="app_form">
                <div class="form_field">
                    <label for="shift_date">Date du shift</label>
                    <input type="date" name="shift_date" id="shift_date_selector">
                </div>

                <div class="form_row">
                    <div id="start_hour_div" class="form_field">
                        <label for="start_hour">Début</label>
                        <input type="time" name="start_hour" id="start_hour_selector">
                    </div>

                    <div id="end_hour_div" class="form_field">
                        <label for="end_hour">Fin</label>
                        <input type="time" name="end_hour" id="end_hour_selector">
                    </div>
                </div>

                <button type="submit">Ajouter shift</button>
            </form>
        </section>

        <hr>

        <section id="filter">
            <div id="date_input" class="form_row">
                <div id="beginning_date_div" class="form_field">
                    <label for="beginning_date">Depuis</label>
                    <input type="date" name="beginning_date" id="beginning_date_selector">
                </div>

                <div id="end_date_div" class="form_field">
                    <label for="end_date">Jusqu'à</label>
                    <input type="date" name="end_date" id="end_date_selector">
                </div>
            </div>

            <button>Copier la liste</button>
        </section>

        <hr>


        <div id="toast" class="toast hidden">Succès</div>

        <section id="history_section">
            <div id="no_shift_to_show" hidden>Aucun shift à afficher pour ces critères</div>
            <h3 id="title">Historique</h3>
            <h3 id="totals">0h - 0$</h3>
            <div id="history">
            </div>
        </section>


        <section id="edit_section">
            <div id="edit_menu" hidden>
                <h3>Modifier</h3>

                <form action="" id="form_modify" class="app_form">

                    <div id="shift_date_modify" class="form_field">
                        <label for="shift_date">Date du shift</label>
                        <input type="date" name="shift_date" id="shift_date_selector_modify">
                    </div>

                    <div class="form_row">
                        <div id="start_hour_div_modify" class="form_field">
                            <label for="start_hour">Début</label>
                            <input type="time" name="start_hour" id="start_hour_selector_modify">
                        </div>

                        <div id="end_hour_div_modify" class="form_field">
                            <label for="end_hour">Fin</label>
                            <input type="time" name="end_hour" id="end_hour_selector_modify">
                        </div>
                    </div>

                    <button type="submit" id="save_edits_btn">Enregistrer modifications</button>
                </form>


                <button id="delete_btn">Supprimer</button>
            </div>
        </section>
    </section>

    <script type="module" src="./app.js"></script> 
</body>
</html>
